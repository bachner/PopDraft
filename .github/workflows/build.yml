name: Build DMG

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build PopDraft
        timeout-minutes: 5
        run: |
          swiftc --version
          swiftc -O -o PopDraft scripts/*.swift -framework Cocoa -framework Carbon -framework WebKit -framework AVFoundation -framework Network
          ls -la PopDraft
          echo "Binary built successfully"

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.0-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Import signing certificate
        # Sign every build with the SAME stable self-signed identity so its
        # designated requirement (identifier + certificate leaf) is constant across
        # releases. macOS TCC then honors the app's Accessibility/Automation grants
        # after an update instead of resetting them (ad-hoc/linker signatures change
        # their cdhash every build, which is why grants used to reset). No-ops
        # gracefully when the secret isn't configured, so the build never breaks.
        env:
          SIGNING_CERT_P12_BASE64: ${{ secrets.SIGNING_CERT_P12_BASE64 }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          if [ -z "$SIGNING_CERT_P12_BASE64" ]; then
            echo "No SIGNING_CERT_P12_BASE64 secret set — using ad-hoc linker signature."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/popdraft-signing.keychain"
          echo "$SIGNING_CERT_P12_BASE64" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p ci "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p ci "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$SIGNING_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k ci "$KEYCHAIN" >/dev/null
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "Imported signing identity (self-signed → shown as not-trusted, which is fine for signing):"
          security find-identity "$KEYCHAIN" | grep -i "PopDraft Code Signing" || echo "(identity not found — check the cert)"

      - name: Build DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          APP_NAME="PopDraft"
          DMG_NAME="${APP_NAME}-${VERSION}"
          BUILD_DIR="build/dmg"
          APP_BUNDLE="${BUILD_DIR}/${APP_NAME}.app"

          mkdir -p "${APP_BUNDLE}/Contents/MacOS"
          mkdir -p "${APP_BUNDLE}/Contents/Resources"

          # Copy binary
          cp PopDraft "${APP_BUNDLE}/Contents/MacOS/"

          # Create Info.plist
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0">' \
            '<dict>' \
            '    <key>CFBundleExecutable</key>' \
            '    <string>PopDraft</string>' \
            '    <key>CFBundleIconFile</key>' \
            '    <string>AppIcon</string>' \
            '    <key>CFBundleIdentifier</key>' \
            '    <string>com.popdraft.app</string>' \
            '    <key>CFBundleName</key>' \
            '    <string>PopDraft</string>' \
            '    <key>CFBundleDisplayName</key>' \
            '    <string>PopDraft</string>' \
            '    <key>CFBundleVersion</key>' \
            "    <string>${VERSION}</string>" \
            '    <key>CFBundleShortVersionString</key>' \
            "    <string>${VERSION}</string>" \
            '    <key>CFBundlePackageType</key>' \
            '    <string>APPL</string>' \
            '    <key>LSMinimumSystemVersion</key>' \
            '    <string>13.0</string>' \
            '    <key>LSUIElement</key>' \
            '    <true/>' \
            '    <key>NSHighResolutionCapable</key>' \
            '    <true/>' \
            '    <key>NSAppleEventsUsageDescription</key>' \
            '    <string>PopDraft needs to send keystrokes to capture selected text.</string>' \
            '</dict>' \
            '</plist>' > "${APP_BUNDLE}/Contents/Info.plist"

          # Copy resources (minimal - just what's needed)
          cp resources/AppIcon.icns "${APP_BUNDLE}/Contents/Resources/"
          cp scripts/llm-tts-server.py "${APP_BUNDLE}/Contents/Resources/"
          cp install.sh "${APP_BUNDLE}/Contents/Resources/"
          cp uninstall.sh "${APP_BUNDLE}/Contents/Resources/"
          cp README.md "${APP_BUNDLE}/Contents/Resources/"

          # Copy bespoke brand PNGs (loaded at runtime by AppAssets)
          mkdir -p "${APP_BUNDLE}/Contents/Resources/Assets"
          cp design-mocks/assets/*.png "${APP_BUNDLE}/Contents/Resources/Assets/"

          # Sign with the stable self-signed identity (makes TCC grants persist
          # across updates). MUST be the last modification to the bundle before the
          # DMG — signing seals it. A self-signed cert is NOT trusted, so it never
          # appears in `find-identity -v`; codesign signs with it anyway when it's in
          # the keychain search list. So we ATTEMPT the signing and verify the
          # result, falling back to the ad-hoc linker signature only if it fails.
          if codesign --force --deep --sign "PopDraft Code Signing" \
               --identifier com.popdraft.app "${APP_BUNDLE}" 2>/dev/null \
             && codesign -dvv "${APP_BUNDLE}" 2>&1 | grep -qi "Authority=PopDraft Code Signing"; then
            echo "Signed with stable identity:"
            codesign -dvv "${APP_BUNDLE}" 2>&1 | grep -iE "Authority=|Identifier=" || true
            codesign -d -r- "${APP_BUNDLE}" 2>&1 | grep -i designated || true
          else
            echo "Stable signing unavailable — shipping ad-hoc linker signature."
          fi

          # Create Applications symlink
          ln -s /Applications "${BUILD_DIR}/Applications"

          # Create DMG
          hdiutil create -volname "${APP_NAME}" -srcfolder "${BUILD_DIR}" -ov -format UDZO "build/${DMG_NAME}.dmg"

          echo "DMG created: build/${DMG_NAME}.dmg"
          ls -la build/

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: PopDraft-${{ steps.version.outputs.version }}
          path: build/*.dmg

  unit-tests:
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run unit tests
        run: |
          swiftc --version
          bash tests/run-tests.sh

  e2e-install-test:
    needs: build
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: PopDraft-${{ needs.build.outputs.version }}

      - name: Mount DMG and install app
        run: |
          DMG_FILE=$(ls *.dmg)
          echo "Testing DMG: $DMG_FILE"

          # Mount the DMG
          MOUNT_OUTPUT=$(hdiutil attach "$DMG_FILE")
          MOUNT_DIR=$(echo "$MOUNT_OUTPUT" | tail -1 | awk -F'\t' '{print $NF}')
          echo "Mounted at: $MOUNT_DIR"

          # Copy app to /Applications (mimicking what .install.command does)
          APP_SRC="$MOUNT_DIR/PopDraft.app"
          APP_DEST="/Applications/PopDraft.app"
          rm -rf "$APP_DEST"
          cp -R "$APP_SRC" "$APP_DEST"
          xattr -cr "$APP_DEST" 2>/dev/null || true
          echo "[OK] PopDraft.app copied to /Applications"

          # Unmount DMG
          hdiutil detach "$MOUNT_DIR" || hdiutil detach "$MOUNT_DIR" -force

      - name: Run install.sh (TTS setup)
        run: |
          # This is what the DMG .install.command now does after copying
          INSTALL_SCRIPT="/Applications/PopDraft.app/Contents/Resources/install.sh"
          test -f "$INSTALL_SCRIPT"
          echo "[OK] install.sh found in app bundle"
          bash "$INSTALL_SCRIPT"

      - name: Verify installation
        run: |
          # App exists
          test -d "/Applications/PopDraft.app"
          echo "[OK] PopDraft.app installed"

          # TTS script exists
          test -f "$HOME/.popdraft/llm-tts-server.py"
          echo "[OK] TTS server script present"

          # Venv exists with correct Python (3.10-3.12)
          VENV_PYTHON="$HOME/.popdraft/tts-venv/bin/python3"
          test -f "$VENV_PYTHON"
          PY_VERSION=$("$VENV_PYTHON" --version)
          echo "[OK] Python venv exists: $PY_VERSION"

          # Verify Python version is in acceptable range
          PY_MINOR=$("$VENV_PYTHON" -c "import sys; print(sys.version_info.minor)")
          if [ "$PY_MINOR" -lt 10 ] || [ "$PY_MINOR" -gt 12 ]; then
            echo "[FAIL] Python version not in 3.10-3.12 range: $PY_VERSION"
            exit 1
          fi
          echo "[OK] Python version in range (3.10-3.12)"

          # kokoro importable
          "$VENV_PYTHON" -c "import kokoro; print(f'kokoro {kokoro.__version__}')"
          echo "[OK] kokoro import verified"

          # Config file exists
          test -f "$HOME/.popdraft/config.json"
          echo "[OK] Config file present"

      - name: Test TTS server
        run: |
          VENV_PYTHON="$HOME/.popdraft/tts-venv/bin/python3"

          # Start TTS server
          "$VENV_PYTHON" "$HOME/.popdraft/llm-tts-server.py" &
          TTS_PID=$!
          echo "TTS server started (PID: $TTS_PID)"

          # Wait for health (model download on first run can be slow)
          HEALTHY=false
          for i in $(seq 1 120); do
            if curl -sf http://127.0.0.1:7865/health > /dev/null 2>&1; then
              echo "[OK] TTS server healthy after ${i}s"
              HEALTHY=true
              break
            fi
            sleep 1
          done

          if [ "$HEALTHY" != "true" ]; then
            echo "[FAIL] TTS server did not become healthy in 120s"
            cat "$HOME/.popdraft/tts-server.log" 2>/dev/null || true
            kill $TTS_PID 2>/dev/null
            exit 1
          fi

          # Test /voices
          VOICE_COUNT=$(curl -sf http://127.0.0.1:7865/voices | python3 -c "import json,sys; v=json.load(sys.stdin); print(sum(len(l['voices']) for l in v.values()))")
          echo "[OK] $VOICE_COUNT voices available"

          # Test /speak with play=0 (generate audio file, don't play)
          AUDIO_PATH=$(curl -sf "http://127.0.0.1:7865/speak?text=hello+world&play=0")
          test -f "$AUDIO_PATH"
          FILE_SIZE=$(stat -f%z "$AUDIO_PATH")
          if [ "$FILE_SIZE" -lt 1000 ]; then
            echo "[FAIL] Audio file too small: $FILE_SIZE bytes"
            exit 1
          fi
          echo "[OK] TTS generated audio: $FILE_SIZE bytes"

          # Test /status
          STATUS=$(curl -sf http://127.0.0.1:7865/status)
          echo "[OK] Server status: $STATUS"

          # Cleanup
          kill $TTS_PID 2>/dev/null || true
          wait $TTS_PID 2>/dev/null || true
          echo "[OK] TTS server stopped"

      - name: Test app launch
        run: |
          open -a PopDraft
          sleep 5
          if pgrep -f "PopDraft.app/Contents/MacOS/PopDraft" > /dev/null; then
            echo "[OK] PopDraft app is running"
            pkill -f "PopDraft.app/Contents/MacOS/PopDraft" || true
          else
            echo "[FAIL] PopDraft app did not start"
            exit 1
          fi

  release:
    needs: [build, e2e-install-test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14

    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: PopDraft-${{ needs.build.outputs.version }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: "*.dmg"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
